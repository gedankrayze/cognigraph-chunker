[package]
name = "cognigraph-python"
version = "0.2.0"
edition = "2024"

[lib]
name = "cognigraph_chunker"
crate-type = ["cdylib"]

[dependencies]
cognigraph-chunker = { path = "../.." }
pyo3 = { version = "0.28", features = ["extension-module"] }
numpy = "0.28"
tokio = { version = "1.51", features = ["rt-multi-thread"] }
anyhow = "1.0"
serde_json = "1.0"
